<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ _('SmrcnaBet') }} – VildaPoints</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        body {
            min-height: 100dvh;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
        }
    </style>
</head>

<body class="d-flex align-items-center justify-content-center position-relative">

<div class="position-absolute top-0 end-0 m-2 m-sm-3 d-flex gap-2">
    <a href="{{ url_for('allbets_public') }}" class="btn btn-sm btn-outline-light border-0">{{ _('All Bets') }}</a>
    <div class="dropdown">
        <button class="btn btn-sm btn-outline-light border-0 dropdown-toggle" data-bs-toggle="dropdown">
            {% for l in available_languages %}{% if l.code == lang %}{{ l.flag }}{% endif %}{% endfor %} {{ _('Language') }}
        </button>
        <ul class="dropdown-menu dropdown-menu-end">
            {% for l in available_languages %}
                <li><a class="dropdown-item {{ 'active' if l.code == lang }}" href="{{ url_for('set_lang', code=l.code) }}">{{ l.flag }} {{ l.name }}</a></li>
            {% endfor %}
        </ul>
    </div>
</div>

<div class="card shadow-lg p-3 p-sm-4 mx-2 mx-sm-3" style="max-width: 400px; width: 100%; border-radius: 15px;">

    <div class="text-center mb-4">
        <h2 class="fw-bold">{{ _('SmrcnaBet') }}</h2>
        <p class="text-muted">{{ _('Enter your username to continue') }}</p>
    </div>

    <form method="POST">

        <div class="mb-3">
            <input type="text"
                   name="username"
                   class="form-control form-control-lg"
                   placeholder="{{ _('Username') }}"
                   required
                   autofocus>
        </div>

        <div class="d-grid">
            <button type="submit"
                    class="btn btn-primary btn-lg">
                {{ _('Enter Dashboard') }}
            </button>
        </div>

    </form>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
