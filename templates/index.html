<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SmrcnaBet – VildaPoints</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        body {
            min-height: 100dvh;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
        }
    </style>
</head>

<body class="d-flex align-items-center justify-content-center position-relative">

<div class="position-absolute top-0 end-0 m-2 m-sm-3">
    <a href="{{ url_for('allbets_public') }}" class="btn btn-sm btn-outline-light border-0">All Bets</a>
</div>

<div class="card shadow-lg p-3 p-sm-4 mx-2 mx-sm-3" style="max-width: 400px; width: 100%; border-radius: 15px;">

    <div class="text-center mb-4">
        <h2 class="fw-bold">SmrcnaBet</h2>
        <p class="text-muted">Enter your username to continue</p>
    </div>

    <form method="POST">

        <div class="mb-3">
            <input type="text"
                   name="username"
                   class="form-control form-control-lg"
                   placeholder="Username"
                   required
                   autofocus>
        </div>

        <div class="d-grid">
            <button type="submit"
                    class="btn btn-primary btn-lg">
                Enter Dashboard
            </button>
        </div>

    </form>

</div>

</body>
</html>
